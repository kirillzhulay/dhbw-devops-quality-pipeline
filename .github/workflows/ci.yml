name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: pytest -q --cov=src/pipeline_app --cov-report=term-missing --cov-fail-under=85 --cov-report=markdown:coverage.md

      - name: Build coverage comment
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Test Coverage Report"
            echo ""
            cat coverage.md
          } > coverage-comment.md

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-coverage
          path: coverage-comment.md

  security:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: bandit -r src/pipeline_app -q
      - run: pip-audit

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: python -m pipeline_app.cli docs/input/chapter1.md docs/input/chapter2.md docs/input/chapter3.md --output build/report.txt
      - run: mkdir -p dist && zip -r dist/pipeline-artifact.zip build/report.txt docs/input src/pipeline_app
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifact
          path: dist/pipeline-artifact.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pipeline-artifact
          path: incoming
      - run: chmod +x scripts/deploy_artifact.sh
      - run: ./scripts/deploy_artifact.sh incoming/pipeline-artifact.zip deploy/target
      - uses: actions/upload-artifact@v4
        with:
          name: deployed-artifact
          path: deploy/target/pipeline-artifact.zip
    
